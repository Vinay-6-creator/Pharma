<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaX Sign Up</title>
  <style>
    :root {
      --bg: #eef6ff;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --blue: #2563eb;
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #eef6ff 0%, #f8fbff 100%);
      color: var(--text);
    }

    .page {
      width: min(520px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .card {
      background: var(--surface);
      border-radius: 32px;
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--blue);
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #22c55e, #2563eb);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .headline {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }

    .subtext {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .form-group {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    label {
      font-size: 0.95rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: #f8fbff;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .btn {
      width: 100%;
      padding: 16px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #22c55e);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .secondary {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .secondary a {
      color: var(--blue);
      font-weight: 600;
    }

    .footnote {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error-msg {
      background-color: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      border-left: 4px solid #dc2626;
      font-size: 0.95rem;
    }

    .success-msg {
      background-color: #dcfce7;
      color: #166534;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      border-left: 4px solid #22c55e;
      font-size: 0.95rem;
    }

    @media (max-width: 540px) {
      .page {
        padding: 24px 0;
      }

      .card {
        padding: 28px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo">
        <span class="logo-icon">P</span>
        PharmaX
      </div>
      <h1 class="headline">Create your account</h1>
      <p class="subtext">Join PharmaX to access study notes, virtual labs, career tools, and the community hub.</p>

      <form id="signupForm">
        <div id="errorMsg" class="error-msg" style="display:none;"></div>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required />
        </div>
        <button type="submit" class="btn">Sign Up</button>
      </form>

      <p class="secondary">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <p class="footnote">By signing up, you agree to PharmaX Terms of Service and Privacy Policy.</p>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      
      // Clear previous messages
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
      
      // Validation
      if (!name || !email || !password) {
        errorMsg.textContent = '⚠️ Please fill all required fields';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = '⚠️ Password must be at least 6 characters long';
        errorMsg.style.display = 'block';
        return;
      }

      // Get all users from localStorage
      let users = JSON.parse(localStorage.getItem('users')) || [];
      
      // Check if email already exists
      if (users.some(user => user.email === email)) {
        errorMsg.textContent = '⚠️ This email is already registered. Please login or use a different email.';
        errorMsg.style.display = 'block';
        return;
      }
      
      // Create new user object
      const newUser = {
        name: name,
        email: email,
        phone: phone || 'Not added',
        password: password
      };
      
      // Add new user to array
      users.push(newUser);
      
      // Save updated users to localStorage
      localStorage.setItem('users', JSON.stringify(users));
      
      // Set current logged-in user
      localStorage.setItem('userLoggedIn', 'true');
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userName', name);
      localStorage.setItem('userPhone', phone || 'Not added');
      
      // Show success and redirect
      errorMsg.textContent = '✅ Account created successfully! Redirecting...';
      errorMsg.className = 'success-msg';
      errorMsg.style.display = 'block';
      
      setTimeout(() => {
        window.location.href = 'profile.html';
      }, 1500);
    });
  </script>
</body>
</html>
